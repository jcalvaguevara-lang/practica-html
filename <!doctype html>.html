<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>My First HTML Page</title>
    <style>
        :root { --bg:#fff; --fg:#111; --accent:#007acc; }
        [data-theme="dark"] { --bg:#111; --fg:#eee; --accent:#68b0ff; }
        html,body{height:100%;margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:var(--bg);color:var(--fg)}
        .container{max-width:900px;margin:3rem auto;padding:1rem}
        header{display:flex;justify-content:space-between;align-items:center}
        button{background:var(--accent);color:#fff;border:none;padding:.5rem 1rem;border-radius:6px;cursor:pointer}
        a{color:var(--accent)}
        footer{margin-top:3rem;font-size:.9rem;color:gray}
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h2>My Website</h2>
            <button id="themeBtn" aria-pressed="false">Toggle theme</button>
        </header>

        <main>
            <h1>Hello, world!</h1>
            <p>This is my first HTML page. Edit and save to see changes.</p>
            <p><a href="#" id="exampleLink">Example link</a></p>
        </main>

        <footer>
            <p>&copy; <span id="year"></span> My Name</p>
        </footer>
    </div>

    <script>
        document.getElementById('year').textContent = new Date().getFullYear();
        const btn = document.getElementById('themeBtn');
        btn.addEventListener('click', () => {
            if (document.documentElement.getAttribute('data-theme') === 'dark') {
                document.documentElement.removeAttribute('data-theme');
                btn.setAttribute('aria-pressed','false');
            } else {
                document.documentElement.setAttribute('data-theme','dark');
                btn.setAttribute('aria-pressed','true');
            }
        });
        document.getElementById('exampleLink').addEventListener('click', e => {
            e.preventDefault();
            alert('Link clicked');
        });
    </script>
</body>
</html>
